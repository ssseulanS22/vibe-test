<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스네이크 게임</title>
  <link rel="stylesheet" href="06.snake.css">
</head>
<body>

  <!-- 메인 카드 컨테이너 -->
  <div class="card">

    <!-- 게임 제목 -->
    <h1 class="title">스네이크 게임</h1>

    <!-- 점수판: 점수 / 레벨 / 최고 점수 -->
    <div class="score-board">
      <div class="score-item">
        <span class="score-label">점수</span>
        <span class="score-value" id="score">0</span>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <span class="score-label">레벨</span>
        <span class="score-value level-value" id="level">1</span>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <span class="score-label">최고 점수</span>
        <span class="score-value" id="best-score">0</span>
      </div>
    </div>

    <!-- 캔버스 영역 (오버레이 포함) -->
    <div class="canvas-wrapper">

      <!-- 게임 캔버스 (400x400, 20x20 격자) -->
      <canvas id="gameCanvas" width="400" height="400"></canvas>

      <!-- 시작 화면 / 게임 오버 오버레이 -->
      <div class="overlay" id="overlay">
        <div class="overlay-box">
          <p class="overlay-title" id="overlay-title">스네이크 게임</p>
          <p class="overlay-msg" id="overlay-msg">방향키로 뱀을 조종하세요</p>

          <!-- 난이도 선택 (시작/재시작 전 표시) -->
          <div class="difficulty-group">
            <span class="diff-label">난이도</span>
            <div class="diff-buttons">
              <button class="btn-diff" data-diff="easy"   onclick="setDifficulty('easy')">쉬움</button>
              <button class="btn-diff active" data-diff="normal" onclick="setDifficulty('normal')">보통</button>
              <button class="btn-diff" data-diff="hard"   onclick="setDifficulty('hard')">어려움</button>
              <button class="btn-diff" data-diff="vhard"  onclick="setDifficulty('vhard')">매우 어려움</button>
            </div>
          </div>

          <button class="btn-start" id="actionBtn" onclick="startGame()">게임 시작</button>
        </div>
      </div>

    </div>

    <!-- 캔버스 하단 컨트롤 영역: 데스크탑=일시정지 중앙 / 모바일=일시정지 좌측 + D패드 우측 -->
    <div class="controls">

      <!-- 일시정지 버튼 (스페이스바와 동일 동작) -->
      <button class="btn-pause" id="pauseBtn" onclick="togglePause()" disabled>⏸ 일시정지</button>

      <!-- D패드 방향 버튼 (모바일 전용, CSS로 표시/숨김 처리) -->
      <div class="dpad">
        <button class="dpad-btn" data-dir="up">▲</button>
        <button class="dpad-btn" data-dir="left">◀</button>
        <button class="dpad-btn" data-dir="right">▶</button>
        <button class="dpad-btn" data-dir="down">▼</button>
      </div>

    </div>

  </div>

  <script>
    /* ===== 상수 정의 ===== */
    const GRID        = 20;   // 격자 한 칸의 픽셀 크기
    const COLS        = 20;   // 가로 칸 수
    const ROWS        = 20;   // 세로 칸 수
    const SIZE        = GRID * COLS; // 캔버스 한 변 크기 (400px)
    const LEVEL_SCORE = 50;   // 레벨업에 필요한 점수 간격 (50점마다)
    const LEVEL_SPEED = 10;   // 레벨당 속도 증가량 (ms 감소)
    const MIN_SPEED   = 30;   // 최고 속도 상한 — 이보다 빠르게는 안 됨

    /* 난이도별 기본 속도 (ms) */
    const DIFFICULTY = {
      easy:  200,
      normal: 150,
      hard:  100,
      vhard:  50
    };

    /* ===== DOM 참조 ===== */
    const canvas    = document.getElementById('gameCanvas');    // 게임 캔버스
    const ctx       = canvas.getContext('2d');                  // 2D 컨텍스트
    const elScore   = document.getElementById('score');         // 점수 표시
    const elLevel   = document.getElementById('level');         // 레벨 표시
    const elBest    = document.getElementById('best-score');    // 최고 점수 표시
    const elOverlay = document.getElementById('overlay');       // 오버레이 컨테이너
    const elTitle   = document.getElementById('overlay-title'); // 오버레이 제목
    const elMsg     = document.getElementById('overlay-msg');   // 오버레이 메시지
    const elPauseBtn = document.getElementById('pauseBtn');     // 일시정지 버튼

    /* ===== 게임 상태 변수 ===== */
    let snake      = [];              // 뱀 몸통 배열: [{x, y}, ...]
    let food       = { x: 0, y: 0 }; // 먹이 위치
    let dir        = { x: 1, y: 0 }; // 현재 이동 방향
    let nextDir    = { x: 1, y: 0 }; // 다음 프레임에 적용할 방향 (입력 버퍼)
    let score      = 0;               // 현재 점수
    let bestScore  = 0;               // 최고 점수
    let level      = 1;               // 현재 레벨
    let difficulty = 'normal';        // 선택된 난이도 키
    let baseSpeed  = 150;             // 현재 난이도의 기본 속도 (ms)
    let loopId     = null;            // setInterval 핸들
    let running    = false;           // 게임 루프 실행 중 여부 (일시정지 시 false)
    let paused     = false;           // 일시정지 상태 여부
    let gameActive = false;           // 카운트다운 후 ~ 게임 오버 전 활성 구간

    /* ===== 초기화: 페이지 로드 시 실행 ===== */
    function init() {
      // localStorage에서 최고 점수 불러오기
      bestScore = parseInt(localStorage.getItem('snakeBestScore') || '0', 10);
      elBest.textContent = bestScore;
      // 시작 전 캔버스 배경만 그려서 빈 화면 방지
      drawBackground();
    }

    /* ===== 난이도 선택 ===== */
    function setDifficulty(diff) {
      difficulty = diff;
      baseSpeed  = DIFFICULTY[diff];
      // 선택한 버튼에만 active 클래스 적용
      document.querySelectorAll('.btn-diff').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.diff === diff);
      });
    }

    /* ===== 현재 레벨에 맞는 게임 속도 반환 ===== */
    function getCurrentSpeed() {
      // 레벨 오를수록 인터벌 짧아짐 (빨라짐), MIN_SPEED 이하로는 내려가지 않음
      return Math.max(MIN_SPEED, baseSpeed - (level - 1) * LEVEL_SPEED);
    }

    /* ===== 카운트다운 실행 (재귀 타이머 방식) ===== */
    function runCountdown(steps, i, onDone) {
      if (i >= steps.length) {
        onDone(); // 카운트다운 완료 → 게임 시작 콜백
        return;
      }
      drawCountdown(steps[i]);
      // 숫자는 800ms, GO!는 500ms 표시 후 다음 단계
      const delay = steps[i] === 'GO!' ? 500 : 800;
      setTimeout(() => runCountdown(steps, i + 1, onDone), delay);
    }

    /* ===== 캔버스에 카운트다운 오버레이 렌더링 ===== */
    function drawCountdown(text) {
      draw(); // 현재 게임 상태를 먼저 그린 뒤 위에 덮기

      // 반투명 딤 레이어
      ctx.fillStyle = 'rgba(0, 0, 0, 0.52)';
      ctx.fillRect(0, 0, SIZE, SIZE);

      const isGo = text === 'GO!'; // GO! 여부로 색상/크기 분기

      // 글로우 효과
      ctx.shadowColor = isGo ? '#4ade80' : '#667eea';
      ctx.shadowBlur  = 40;

      // 카운트다운 숫자 또는 GO! 텍스트
      ctx.font         = `bold ${isGo ? 58 : 96}px 'Segoe UI', 'Malgun Gothic', sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = '#ffffff';
      ctx.fillText(text, SIZE / 2, SIZE / 2);

      // 숫자 아래 안내 텍스트 (GO!일 때는 생략)
      if (!isGo) {
        ctx.shadowBlur = 0;
        ctx.font       = '16px "Segoe UI", "Malgun Gothic", sans-serif';
        ctx.fillStyle  = 'rgba(255,255,255,0.5)';
        ctx.fillText('준비하세요', SIZE / 2, SIZE / 2 + 64);
      }

      // 컨텍스트 상태 초기화
      ctx.shadowBlur   = 0;
      ctx.textAlign    = 'left';
      ctx.textBaseline = 'alphabetic';
    }

    /* ===== 게임 시작 / 재시작 ===== */
    function startGame() {
      // 오버레이 숨기기
      elOverlay.classList.add('hidden');

      // 뱀 초기 위치: 중앙 3칸, 오른쪽 방향
      snake      = [{ x: 12, y: 10 }, { x: 11, y: 10 }, { x: 10, y: 10 }];
      dir        = { x: 1, y: 0 };
      nextDir    = { x: 1, y: 0 };
      score      = 0;
      level      = 1;
      paused     = false;
      gameActive = false;

      // UI 초기값 표시
      elScore.textContent    = 0;
      elLevel.textContent    = 1;
      elPauseBtn.textContent = '⏸ 일시정지';
      elPauseBtn.disabled    = true; // 카운트다운 중에는 비활성

      // 먹이 배치 및 초기 화면 렌더링
      placeFood();
      draw();

      // 기존 루프 제거
      if (loopId) clearInterval(loopId);

      // 3 → 2 → 1 → GO! 카운트다운 후 루프 시작
      runCountdown(['3', '2', '1', 'GO!'], 0, () => {
        loopId     = setInterval(gameLoop, getCurrentSpeed());
        running    = true;
        gameActive = true;
        elPauseBtn.disabled = false; // 게임 시작 후 활성화
      });
    }

    /* ===== 일시정지 / 재개 토글 ===== */
    function togglePause() {
      if (!gameActive) return; // 카운트다운 중이거나 게임 오버 후에는 동작 안 함

      if (paused) {
        // 재개: 루프 재시작, 상태 복원
        paused  = false;
        running = true;
        loopId  = setInterval(gameLoop, getCurrentSpeed());
        elPauseBtn.textContent = '⏸ 일시정지';
        draw(); // 일시정지 오버레이 지우기
      } else {
        // 일시정지: 루프 중지, 캔버스에 일시정지 표시
        paused  = true;
        running = false;
        clearInterval(loopId);
        loopId  = null;
        elPauseBtn.textContent = '▶ 재개';
        drawPauseOverlay();
      }
    }

    /* ===== 캔버스에 일시정지 오버레이 렌더링 ===== */
    function drawPauseOverlay() {
      draw(); // 게임 상태 먼저 그리기

      // 반투명 딤 레이어
      ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
      ctx.fillRect(0, 0, SIZE, SIZE);

      // 일시정지 아이콘 글로우
      ctx.shadowColor = '#667eea';
      ctx.shadowBlur  = 30;

      // 일시정지 텍스트
      ctx.font         = 'bold 48px "Segoe UI", "Malgun Gothic", sans-serif';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = '#ffffff';
      ctx.fillText('⏸ 일시정지', SIZE / 2, SIZE / 2);

      // 안내 텍스트
      ctx.shadowBlur = 0;
      ctx.font       = '14px "Segoe UI", "Malgun Gothic", sans-serif';
      ctx.fillStyle  = 'rgba(255,255,255,0.55)';
      ctx.fillText('스페이스바 또는 버튼으로 재개', SIZE / 2, SIZE / 2 + 50);

      // 컨텍스트 상태 초기화
      ctx.textAlign    = 'left';
      ctx.textBaseline = 'alphabetic';
    }

    /* ===== 게임 루프: getCurrentSpeed() ms마다 실행 ===== */
    function gameLoop() {
      // 버퍼에 저장된 방향을 실제 방향에 적용
      dir = nextDir;

      // 새 머리 위치 계산
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // 벽 충돌 검사 (0 미만 또는 COLS/ROWS 이상이면 충돌)
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        gameOver();
        return;
      }

      // 자기 몸 충돌 검사 (머리와 몸통 좌표 일치)
      if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
        gameOver();
        return;
      }

      // 새 머리를 뱀 앞쪽에 추가
      snake.unshift(head);

      // 먹이 좌표와 머리 일치 확인
      if (head.x === food.x && head.y === food.y) {
        // 먹이 먹음: 점수 +10, 새 먹이 배치 (꼬리 제거 없음 → 길이 증가)
        score += 10;
        updateScore();
        placeFood();
      } else {
        // 먹이 못 먹음: 꼬리 제거 (길이 유지)
        snake.pop();
      }

      // 화면 렌더링
      draw();
    }

    /* ===== 먹이 랜덤 배치 (뱀 몸통과 겹치지 않는 위치) ===== */
    function placeFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(seg => seg.x === pos.x && seg.y === pos.y));
      food = pos;
    }

    /* ===== 점수 업데이트 및 레벨업 체크 ===== */
    function updateScore() {
      elScore.textContent = score;

      // 최고 점수 갱신 시 localStorage에 저장
      if (score > bestScore) {
        bestScore = score;
        elBest.textContent = bestScore;
        localStorage.setItem('snakeBestScore', bestScore);
      }

      // 50점마다 레벨업: 현재 점수로 레벨 재계산
      const newLevel = Math.floor(score / LEVEL_SCORE) + 1;
      if (newLevel > level) {
        level = newLevel;
        elLevel.textContent = level;
        // 인터벌을 새 속도로 재시작해 즉시 반영
        clearInterval(loopId);
        loopId = setInterval(gameLoop, getCurrentSpeed());
      }
    }

    /* ===== 게임 오버 처리 ===== */
    function gameOver() {
      // 루프 중지 및 상태 리셋
      clearInterval(loopId);
      loopId     = null;
      running    = false;
      paused     = false;
      gameActive = false;

      // 일시정지 버튼 비활성 복원
      elPauseBtn.disabled    = true;
      elPauseBtn.textContent = '⏸ 일시정지';

      // 게임 오버 오버레이 표시
      elTitle.textContent = '게임 오버';
      elMsg.textContent   = `점수: ${score}점 · 레벨: ${level} · 최고 점수: ${bestScore}점`;
      document.getElementById('actionBtn').textContent = '다시 시작';
      elOverlay.classList.remove('hidden');
    }

    /* ===== 전체 화면 렌더링 ===== */
    function draw() {
      drawBackground(); // 배경 및 격자
      drawFood();       // 먹이
      drawSnake();      // 뱀
    }

    /* ===== 배경 및 격자 그리기 ===== */
    function drawBackground() {
      // 어두운 네이비 배경
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, SIZE, SIZE);

      // 격자선 (매우 연하게)
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
      ctx.lineWidth   = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * GRID, 0);
        ctx.lineTo(i * GRID, SIZE);
        ctx.stroke();
      }
      for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath();
        ctx.moveTo(0, j * GRID);
        ctx.lineTo(SIZE, j * GRID);
        ctx.stroke();
      }
    }

    /* ===== 먹이 그리기 (글로우 원형) ===== */
    function drawFood() {
      const cx = food.x * GRID + GRID / 2; // 먹이 중심 x
      const cy = food.y * GRID + GRID / 2; // 먹이 중심 y
      const r  = GRID / 2 - 2;             // 반지름

      // 빨간 글로우 발광
      ctx.shadowColor = '#f43f5e';
      ctx.shadowBlur  = 12;
      ctx.fillStyle   = '#f43f5e';
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();

      // 하이라이트 (작은 흰 원)
      ctx.shadowBlur = 0;
      ctx.fillStyle  = 'rgba(255, 255, 255, 0.5)';
      ctx.beginPath();
      ctx.arc(cx - r * 0.3, cy - r * 0.35, r * 0.28, 0, Math.PI * 2);
      ctx.fill();
    }

    /* ===== 뱀 그리기 ===== */
    function drawSnake() {
      snake.forEach((seg, i) => {
        const x = seg.x * GRID + 1; // 격자 내 x (1px 여백)
        const y = seg.y * GRID + 1; // 격자 내 y (1px 여백)
        const w = GRID - 2;         // 세그먼트 너비
        const h = GRID - 2;         // 세그먼트 높이

        if (i === 0) {
          // 머리: 밝은 연두색 + 글로우
          ctx.fillStyle   = '#4ade80';
          ctx.shadowColor = '#4ade80';
          ctx.shadowBlur  = 8;
        } else {
          // 몸통: 꼬리 쪽으로 갈수록 투명해지는 초록
          const t     = i / snake.length;
          const alpha = Math.max(0.35, 1 - t * 0.6);
          ctx.fillStyle  = `rgba(34, 197, 94, ${alpha})`;
          ctx.shadowBlur = 0;
        }

        // 둥근 사각형으로 세그먼트 그리기
        drawRoundRect(x, y, w, h, 4);

        // 머리에만 눈 그리기
        if (i === 0) {
          ctx.shadowBlur = 0;
          drawEyes(seg);
        }
      });

      // 그림자 초기화
      ctx.shadowBlur = 0;
    }

    /* ===== 뱀 머리 눈 그리기 (방향에 따라 위치 변경) ===== */
    function drawEyes(seg) {
      const bx = seg.x * GRID; // 세그먼트 왼쪽 상단 x
      const by = seg.y * GRID; // 세그먼트 왼쪽 상단 y
      const er = 2.5;           // 눈 반지름

      // 방향에 따른 눈 좌표 결정
      let e1, e2;
      if (dir.x === 1) {
        // 오른쪽: 오른쪽 상/하
        e1 = { x: bx + 14, y: by + 5  };
        e2 = { x: bx + 14, y: by + 13 };
      } else if (dir.x === -1) {
        // 왼쪽: 왼쪽 상/하
        e1 = { x: bx + 5, y: by + 5  };
        e2 = { x: bx + 5, y: by + 13 };
      } else if (dir.y === -1) {
        // 위쪽: 상단 좌/우
        e1 = { x: bx + 5,  y: by + 5 };
        e2 = { x: bx + 13, y: by + 5 };
      } else {
        // 아래쪽: 하단 좌/우
        e1 = { x: bx + 5,  y: by + 14 };
        e2 = { x: bx + 13, y: by + 14 };
      }

      // 흰 눈 → 검은 눈동자 순서로 렌더링
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(e1.x, e1.y, er,     0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2.x, e2.y, er,     0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#0f172a';
      ctx.beginPath(); ctx.arc(e1.x, e1.y, er - 1, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2.x, e2.y, er - 1, 0, Math.PI * 2); ctx.fill();
    }

    /* ===== 둥근 사각형 헬퍼 ===== */
    function drawRoundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h,     x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y,         x + r, y);
      ctx.closePath();
      ctx.fill();
    }

    /* ===== 키보드 입력 처리 ===== */
    document.addEventListener('keydown', (e) => {
      // 방향키·스페이스바 기본 동작(스크롤 등) 차단
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
        e.preventDefault();
      }

      // 스페이스바: 일시정지 토글 (gameActive 상태에서만 동작)
      if (e.key === ' ') {
        togglePause();
        return;
      }

      // 방향키: 게임 루프 실행 중(running=true, 일시정지 아님)일 때만 처리
      if (!running) return;

      switch (e.key) {
        case 'ArrowUp':
          // 현재 아래 방향이면 위로 전환 불가 (역방향 방지)
          if (dir.y !== 1)  nextDir = { x: 0,  y: -1 };
          break;
        case 'ArrowDown':
          // 현재 위 방향이면 아래로 전환 불가
          if (dir.y !== -1) nextDir = { x: 0,  y:  1 };
          break;
        case 'ArrowLeft':
          // 현재 오른쪽 방향이면 왼쪽으로 전환 불가
          if (dir.x !== 1)  nextDir = { x: -1, y:  0 };
          break;
        case 'ArrowRight':
          // 현재 왼쪽 방향이면 오른쪽으로 전환 불가
          if (dir.x !== -1) nextDir = { x:  1, y:  0 };
          break;
      }
    });

    /* ===== 터치 입력 처리 (모바일 조종) ===== */
    // 캔버스를 중심 기준 4방향으로 분할 — 터치 위치에 따라 뱀 방향 결정
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault(); // 기본 스크롤·줌 동작 차단
      if (!running) return; // 일시정지·카운트다운 중에는 무시

      const touch = e.changedTouches[0];
      const rect  = canvas.getBoundingClientRect();

      // 캔버스 내 터치 좌표 (CSS 표시 크기 기준)
      const relX = touch.clientX - rect.left;
      const relY = touch.clientY - rect.top;

      // 캔버스 중심에서의 상대 벡터
      const dx = relX - rect.width  / 2;
      const dy = relY - rect.height / 2;

      // |dx| vs |dy| 비교로 좌우/상하 영역 판단 (45도 대각선 분할)
      if (Math.abs(dx) >= Math.abs(dy)) {
        // 캔버스 좌우 영역 터치
        if (dx > 0 && dir.x !== -1)      nextDir = { x: 1,  y: 0 }; // 오른쪽
        else if (dx <= 0 && dir.x !== 1) nextDir = { x: -1, y: 0 }; // 왼쪽
      } else {
        // 캔버스 상하 영역 터치
        if (dy > 0 && dir.y !== -1)      nextDir = { x: 0, y: 1  }; // 아래
        else if (dy <= 0 && dir.y !== 1) nextDir = { x: 0, y: -1 }; // 위
      }
    }, { passive: false });

    // touchmove 기본 동작 차단 (게임 중 페이지 스크롤 방지)
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
    }, { passive: false });

    /* ===== D패드 방향 적용 헬퍼 ===== */
    function applyDpadDir(d) {
      switch (d) {
        case 'up':    if (dir.y !== 1)  nextDir = { x: 0,  y: -1 }; break; // 현재 아래 방향이면 위로 전환 불가
        case 'down':  if (dir.y !== -1) nextDir = { x: 0,  y:  1 }; break; // 현재 위 방향이면 아래로 전환 불가
        case 'left':  if (dir.x !== 1)  nextDir = { x: -1, y:  0 }; break; // 현재 오른쪽이면 왼쪽으로 전환 불가
        case 'right': if (dir.x !== -1) nextDir = { x:  1, y:  0 }; break; // 현재 왼쪽이면 오른쪽으로 전환 불가
      }
    }

    /* ===== D패드 버튼 이벤트 등록 ===== */
    document.querySelectorAll('.dpad-btn').forEach(btn => {
      // 터치 (모바일 기본)
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault(); // 탭 후 발생하는 click 이벤트 방지
        if (!running) return;
        applyDpadDir(btn.dataset.dir);
      }, { passive: false });

      // 마우스 (데스크탑 테스트용)
      btn.addEventListener('mousedown', () => {
        if (!running) return;
        applyDpadDir(btn.dataset.dir);
      });
    });

    /* ===== 페이지 로드 시 초기화 실행 ===== */
    init();
  </script>

</body>
</html>
