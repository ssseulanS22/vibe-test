<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>홍길동 - 프로필</title>
  <!-- 이 페이지 전용 스타일시트 -->
  <link rel="stylesheet" href="02.profile.css">
</head>
<body>
  <!-- 중앙 정렬 프로필 카드 -->
  <div class="card">
    <!-- 이모지 아바타 -->
    <div class="avatar">👨‍💻</div>

    <!-- 이름 및 직업 -->
    <h1 class="name">홍길동</h1>
    <p class="job">프론트엔드 개발자</p>

    <!-- 구분선 -->
    <div class="divider"></div>

    <!-- 취미 목록 -->
    <div class="hobbies">
      <h2>취미</h2>
      <ul>
        <li>🎬 영화 감상</li>
        <li>💻 코딩</li>
        <li>✈️ 여행</li>
      </ul>
    </div>
  </div>

  <!-- 진입점: initApp() -->
  <script src="02.profile.js"></script>
</body>
</html>
