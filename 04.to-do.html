<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 할 일 목록</title>
  <link rel="stylesheet" href="04.to-do.css">
</head>
<body>
  <div class="card">
    <h1 class="title">나의 할 일 목록</h1>

    <!-- 입력 영역 -->
    <div class="input-row">
      <input
        type="text"
        class="todo-input"
        placeholder="할 일을 입력하세요"
      >
      <button class="add-btn">추가</button>
    </div>


    <!-- 할 일 목록 -->
    <ul class="todo-list"></ul>

    <!-- 목록이 비었을 때 안내 문구 -->
    <p class="empty-msg">아직 할 일이 없어요. 위에서 추가해보세요!</p>
  </div>

  <script src="04.to-do.js"></script>
</body>
</html>
