<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter</title>
  <link rel="stylesheet" href="03.counter.css">
</head>
<body>
  <div class="card">
    <h1 class="title">카운터</h1>
    <div class="count" id="count">0</div>
    <div class="buttons">
      <button class="btn btn-minus" id="btnMinus">−</button>
      <button class="btn btn-reset" id="btnReset">리셋</button>
      <button class="btn btn-plus" id="btnPlus">+</button>
    </div>
  </div>
  <script src="03.counter.js"></script>
</body>
</html>
