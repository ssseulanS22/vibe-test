<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter</title>
  <link rel="stylesheet" href="03.counter.css">
</head>
<body>
  <div class="card">
    <h1 class="title">카운터</h1>
    <div class="count" id="count">0</div>
    <div class="buttons">
      <button class="btn btn-minus" id="btnMinus">−</button>
      <button class="btn btn-reset" id="btnReset">리셋</button>
      <button class="btn btn-plus" id="btnPlus">+</button>
    </div>
  </div>

  <script>
function initApp() {
  const countEl  = document.getElementById('count');
  const btnPlus  = document.getElementById('btnPlus');
  const btnMinus = document.getElementById('btnMinus');
  const btnReset = document.getElementById('btnReset');

  let value = 0;

  function render() {
    countEl.textContent = value;
    countEl.className = 'count ' + (value > 0 ? 'positive' : value < 0 ? 'negative' : 'zero');
  }

  function bump() {
    countEl.classList.add('bump');
    setTimeout(() => countEl.classList.remove('bump'), 120);
  }

  btnPlus.addEventListener('click', () => { value++; bump(); render(); });
  btnMinus.addEventListener('click', () => { value--; bump(); render(); });
  btnReset.addEventListener('click', () => { value = 0; render(); });

  render();
}

initApp();
  </script>
</body>
</html>
